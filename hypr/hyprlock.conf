general {
    no_fade_in = false
    grace = 0
    disable_loading = true
}

background {
    monitor =
    # 抓取當前的影片畫面作為背景
    path = /home/tree/Pictures/wallpaper.png
    # 模糊度：3-5 之間最有「磨砂玻璃」感
    blur_passes = 3 
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
}

# 顯示時間 (亮青色)
label {
    monitor =
    text = $TIME
    color = rgb(0, 255, 255) # 亮青色 #00FFFF
    font_size = 90
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 100
    halign = center
    valign = center
}

# 密碼輸入框
input-field {
    monitor =
    size = 250, 60
    outline_thickness = 3
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    # 邊框顏色：亮青色
    outer_color = rgb(0, 255, 255)
    # 內部背景：半透明黑色，透出後面的模糊桌布
    inner_color = rgba(0, 0, 0, 0.5)
    font_color = rgb(200, 200, 200)
    placeholder_text = <i>Password...</i>
    hide_input = false
    position = 0, -50
    halign = center
    valign = center
}
